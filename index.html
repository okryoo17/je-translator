<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="no">
<meta name="apple-mobile-web-app-title" content="通訳">
<title>JP/EN 通訳</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23111'/><text x='50' y='62' font-size='52' text-anchor='middle' fill='white'>JE</text></svg>">
<style>
  :root {
    color-scheme: dark;
    --fs-main: 32px;
    --fs-history: 14px;
    --fs-conf: 22px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #000; color: #fff; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    overscroll-behavior: none;
  }
  body { display: flex; flex-direction: column; }

  /* ========== 対面モード ========== */
  body[data-mode="conf"] .half { display: none; }
  body[data-mode="face"] #conferenceView { display: none; }

  .half {
    flex: 1; position: relative;
    display: flex; flex-direction: column;
    overflow: hidden;
    padding: 14px 18px;
  }
  .half.top {
    background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
    transform: rotate(180deg);
    padding-top: max(14px, env(safe-area-inset-top));
    padding-bottom: 56px;
  }
  .half.bottom {
    background: linear-gradient(0deg, #1c1917 0%, #0c0a09 100%);
    padding-top: 56px;
    padding-bottom: max(14px, env(safe-area-inset-bottom));
  }
  .header-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .lang-badge {
    font-size: 10px; letter-spacing: 0.18em; opacity: 0.55;
    text-transform: uppercase; font-weight: 600;
  }
  .role { font-size: 10px; opacity: 0.45; letter-spacing: 0.1em; }
  .history {
    flex: 0 0 auto; max-height: 28%; overflow-y: auto;
    font-size: var(--fs-history); line-height: 1.5;
    opacity: 0.5; margin-bottom: 8px;
    -webkit-overflow-scrolling: touch;
  }
  .history div { margin: 4px 0; }
  .history::-webkit-scrollbar { display: none; }
  .main-text {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-size: var(--fs-main); font-weight: 600; line-height: 1.35;
    text-align: center; word-break: break-word;
    padding: 8px 4px; min-height: 0;
  }
  .main-text.placeholder { opacity: 0.3; font-weight: 400; font-size: 17px; }
  .interim {
    flex: 0 0 auto; min-height: 22px;
    font-size: 13px; opacity: 0.55; text-align: center;
    margin-top: 4px;
  }

  /* ========== 会議モード ========== */
  #conferenceView {
    flex: 1;
    display: flex; flex-direction: column;
    background: linear-gradient(180deg, #0c0a09 0%, #1c1917 100%);
    padding: max(12px, env(safe-area-inset-top)) 16px 0;
    overflow: hidden;
  }
  .conf-header {
    flex: 0 0 auto;
    padding: 6px 4px 10px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid #27272a;
    margin-bottom: 8px;
  }
  .conf-header .title { font-size: 12px; opacity: 0.6; letter-spacing: 0.1em; }
  .conf-header .dot { width: 8px; height: 8px; border-radius: 50%; background: #52525b; }
  .conf-header.live .dot { background: #ef4444; animation: blink 1s infinite; }

  #confLog {
    flex: 1; overflow-y: auto; padding-bottom: 120px;
    -webkit-overflow-scrolling: touch;
  }
  #confLog::-webkit-scrollbar { display: none; }
  .conf-msg {
    margin: 10px 0; padding: 10px 12px;
    border-radius: 12px; border-left: 3px solid;
    animation: pop 0.2s ease-out;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .conf-msg.from-ja { background: #1c1917; border-color: #dc2626; }
  .conf-msg.from-en { background: #0f172a; border-color: #3b82f6; }
  .conf-msg .tag {
    font-size: 9px; letter-spacing: 0.14em; opacity: 0.55;
    margin-bottom: 4px; font-weight: 600;
  }
  .conf-msg .src {
    font-size: 12px; line-height: 1.45; opacity: 0.55;
    margin-bottom: 5px;
  }
  .conf-msg .dst {
    font-size: var(--fs-conf); line-height: 1.4; font-weight: 600;
  }
  #confInterim {
    position: absolute; left: 16px; right: 16px;
    bottom: 80px;
    text-align: center; font-size: 13px; opacity: 0.5;
    pointer-events: none;
    min-height: 20px;
  }

  /* ========== 共通：中央バー ========== */
  body[data-mode="face"] .center-bar {
    position: absolute; left: 0; right: 0; top: 50%;
    transform: translateY(-50%);
  }
  body[data-mode="conf"] .center-bar {
    position: absolute; left: 0; right: 0;
    bottom: max(14px, env(safe-area-inset-bottom));
  }
  .center-bar {
    height: 56px;
    display: flex; align-items: center; justify-content: center;
    gap: 12px;
    pointer-events: none;
    z-index: 10;
  }
  .center-bar > * { pointer-events: auto; }

  .interim.active::after, #confInterim.active::after {
    content: ''; display: inline-block;
    width: 6px; height: 6px; margin-left: 6px;
    background: #ef4444; border-radius: 50%;
    animation: blink 1s infinite;
    vertical-align: middle;
  }
  @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

  #startBtn {
    width: 56px; height: 56px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.85);
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    cursor: pointer; font-family: inherit;
    transition: transform 0.08s, background 0.15s;
  }
  #startBtn:active { transform: scale(0.92); }
  #startBtn.running {
    background: #dc2626; border-color: #fca5a5;
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.6); }
    50% { box-shadow: 0 0 0 14px rgba(220,38,38,0); }
  }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(0,0,0,0.6);
    color: #fff; font-size: 17px;
    cursor: pointer; font-family: inherit;
  }
  .icon-btn:active { transform: scale(0.92); }
  .icon-btn.active { background: #1e40af; border-color: #60a5fa; }

  /* ========== モーダル・設定 ========== */
  .modal {
    position: fixed; inset: 0;
    background: #0a0a0a; z-index: 100;
    display: none; flex-direction: column;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .modal.show { display: flex; }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid #27272a;
  }
  .modal-head h2 { font-size: 16px; margin: 0; font-weight: 600; }
  .modal-actions { display: flex; gap: 8px; }
  .modal-actions button {
    border: 1px solid #3f3f46; background: #18181b; color: #fff;
    padding: 7px 12px; border-radius: 8px;
    font-family: inherit; font-size: 12px; cursor: pointer;
  }
  .modal-actions button.danger { border-color: #7f1d1d; color: #fca5a5; }
  .modal-body { flex: 1; overflow-y: auto; padding: 14px 18px; -webkit-overflow-scrolling: touch; }
  .log-entry { padding: 10px 0; border-bottom: 1px solid #1f1f23; }
  .log-entry .ts { font-size: 10px; color: #71717a; letter-spacing: 0.08em; margin-bottom: 4px; }
  .log-entry .src { font-size: 13px; color: #a1a1aa; line-height: 1.5; margin-bottom: 3px; }
  .log-entry .dst { font-size: 15px; color: #fff; line-height: 1.5; }
  .log-entry .lang-tag {
    display: inline-block; font-size: 9px; padding: 1px 5px;
    border-radius: 3px; margin-right: 6px; background: #27272a; color: #d4d4d8;
  }
  .empty-log { text-align: center; padding: 60px 20px; color: #52525b; font-size: 13px; }

  .search-bar {
    flex: 0 0 auto;
    padding: 10px 18px;
    border-bottom: 1px solid #27272a;
    display: flex; gap: 8px;
  }
  .search-bar input, .search-bar select {
    background: #18181b; border: 1px solid #3f3f46; color: #fff;
    padding: 8px 10px; border-radius: 8px;
    font-family: inherit; font-size: 13px;
    -webkit-user-select: text; user-select: text;
  }
  .search-bar input { flex: 1; }
  .search-bar select { flex: 0 0 auto; max-width: 130px; }
  .date-group {
    font-size: 11px; letter-spacing: 0.12em;
    color: #fbbf24; padding: 14px 0 6px;
    border-bottom: 1px solid #422006;
    margin: 12px 0 4px;
    font-weight: 700;
  }
  .hl { background: #fbbf2455; padding: 0 2px; border-radius: 2px; }

  /* マイクインジケータ */
  .mic-meter {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 4px; border-radius: 2px;
    background: #dc2626;
    bottom: 70px; height: 4px;
    transition: height 0.08s, background 0.15s;
    z-index: 5; pointer-events: none;
    opacity: 0;
  }
  body[data-mode="conf"] .mic-meter { bottom: 90px; }
  .mic-meter.live { opacity: 1; }

  .panel {
    position: fixed; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    background: #18181b; border: 1px solid #3f3f46;
    border-radius: 16px; padding: 20px 22px;
    width: min(300px, 88vw);
    z-index: 100; display: none;
  }
  .panel.show { display: block; }
  .panel h3 { margin: 0 0 14px; font-size: 15px; }
  .panel label { display: block; font-size: 12px; margin: 12px 0 4px; opacity: 0.7; }
  .panel .val { float: right; font-size: 11px; opacity: 0.6; }
  .panel input[type=range] { width: 100%; accent-color: #dc2626; }
  .panel .row { display: flex; gap: 8px; margin-top: 18px; }
  .panel button {
    flex: 1; padding: 10px;
    border: 1px solid #dc2626; background: #dc2626;
    color: #fff; border-radius: 8px;
    font-family: inherit; font-size: 13px; cursor: pointer;
  }
  .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; display: none; }
  .backdrop.show { display: block; }
  .err {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.92); color: #fca5a5;
    padding: 8px 16px; border-radius: 8px; font-size: 12px;
    max-width: 80vw; text-align: center; z-index: 200;
    border: 1px solid #7f1d1d;
  }
</style>
</head>
<body data-mode="face">

<!-- ========== 対面モード ========== -->
<div class="half top">
  <div class="header-row">
    <div class="lang-badge">English</div>
    <div class="role">PARTNER</div>
  </div>
  <div class="history" id="histEn"></div>
  <div class="main-text placeholder" id="dstEn">tap center to start</div>
  <div class="interim" id="interimEn"></div>
</div>

<div class="half bottom">
  <div class="header-row">
    <div class="lang-badge">日本語</div>
    <div class="role">あなた</div>
  </div>
  <div class="history" id="histJa"></div>
  <div class="main-text placeholder" id="dstJa">中央のボタンで開始</div>
  <div class="interim" id="interimJa"></div>
</div>

<!-- ========== 会議モード ========== -->
<div id="conferenceView">
  <div class="conf-header" id="confHead">
    <div class="dot"></div>
    <div class="title">会議モード — 全員の発言を字幕表示</div>
  </div>
  <div id="confLog"></div>
  <div id="confInterim"></div>
</div>

<div class="mic-meter" id="micMeter"></div>

<!-- ========== 中央バー ========== -->
<div class="center-bar">
  <button id="logBtn" class="icon-btn" aria-label="議事録">📋</button>
  <button id="modeBtn" class="icon-btn" aria-label="モード切替">👥</button>
  <button id="startBtn">START</button>
  <button id="settingsBtn" class="icon-btn" aria-label="設定">⚙</button>
</div>

<!-- ========== 議事録モーダル ========== -->
<div class="modal" id="logModal">
  <div class="modal-head">
    <h2>議事録</h2>
    <div class="modal-actions">
      <button id="logCopy">コピー</button>
      <button id="logClear" class="danger">削除</button>
      <button id="logClose">閉じる</button>
    </div>
  </div>
  <div class="search-bar">
    <input type="search" id="logSearch" placeholder="検索（原文・訳文どちらも対象）">
    <select id="logDate"><option value="">全期間</option></select>
  </div>
  <div class="modal-body" id="logBody"></div>
</div>

<!-- ========== 設定パネル ========== -->
<div class="backdrop" id="backdrop"></div>
<div class="panel" id="panel">
  <h3>設定</h3>
  <label>文字サイズ（対面） <span class="val" id="vFs">32px</span></label>
  <input type="range" id="rFs" min="20" max="60" step="2" value="32">
  <label>文字サイズ（会議） <span class="val" id="vConf">22px</span></label>
  <input type="range" id="rConf" min="14" max="36" step="1" value="22">
  <label>履歴文字サイズ <span class="val" id="vHis">14px</span></label>
  <input type="range" id="rHis" min="10" max="20" step="1" value="14">
  <div class="row"><button id="panelClose">閉じる</button></div>
</div>

<script>
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const $ = (id) => document.getElementById(id);
const startBtn = $('startBtn');
const logBtn = $('logBtn');
const modeBtn = $('modeBtn');
const settingsBtn = $('settingsBtn');
const logModal = $('logModal');
const logBody = $('logBody');
const logCopy = $('logCopy');
const logClear = $('logClear');
const logClose = $('logClose');
const logSearch = $('logSearch');
const logDate = $('logDate');
const micMeter = $('micMeter');
const panel = $('panel');
const backdrop = $('backdrop');
const panelClose = $('panelClose');
const rFs = $('rFs'), vFs = $('vFs');
const rConf = $('rConf'), vConf = $('vConf');
const rHis = $('rHis'), vHis = $('vHis');
const histEn = $('histEn'), histJa = $('histJa');
const dstEn = $('dstEn'), dstJa = $('dstJa');
const interimEn = $('interimEn'), interimJa = $('interimJa');
const confLog = $('confLog');
const confInterim = $('confInterim');
const confHead = $('confHead');

// ---- 設定 ----
const cfg = JSON.parse(localStorage.getItem('cfg') || '{}');
const fontSize = cfg.fontSize || 32;
const confSize = cfg.confSize || 22;
const histSize = cfg.histSize || 14;
const initialMode = cfg.mode || 'face';
document.body.dataset.mode = initialMode;
modeBtn.classList.toggle('active', initialMode === 'conf');
document.documentElement.style.setProperty('--fs-main', fontSize + 'px');
document.documentElement.style.setProperty('--fs-conf', confSize + 'px');
document.documentElement.style.setProperty('--fs-history', histSize + 'px');
rFs.value = fontSize; vFs.textContent = fontSize + 'px';
rConf.value = confSize; vConf.textContent = confSize + 'px';
rHis.value = histSize; vHis.textContent = histSize + 'px';

function saveCfg() {
  localStorage.setItem('cfg', JSON.stringify({
    fontSize: parseInt(rFs.value),
    confSize: parseInt(rConf.value),
    histSize: parseInt(rHis.value),
    mode: document.body.dataset.mode,
  }));
}
rFs.addEventListener('input', () => {
  document.documentElement.style.setProperty('--fs-main', rFs.value + 'px');
  vFs.textContent = rFs.value + 'px'; saveCfg();
});
rConf.addEventListener('input', () => {
  document.documentElement.style.setProperty('--fs-conf', rConf.value + 'px');
  vConf.textContent = rConf.value + 'px'; saveCfg();
});
rHis.addEventListener('input', () => {
  document.documentElement.style.setProperty('--fs-history', rHis.value + 'px');
  vHis.textContent = rHis.value + 'px'; saveCfg();
});

settingsBtn.addEventListener('click', () => { panel.classList.add('show'); backdrop.classList.add('show'); });
[panelClose, backdrop].forEach(el => el.addEventListener('click', () => {
  panel.classList.remove('show'); backdrop.classList.remove('show');
}));

modeBtn.addEventListener('click', () => {
  const next = document.body.dataset.mode === 'face' ? 'conf' : 'face';
  document.body.dataset.mode = next;
  modeBtn.classList.toggle('active', next === 'conf');
  saveCfg();
});

// ---- 議事録 ----
let logEntries = JSON.parse(localStorage.getItem('logEntries') || '[]');
function saveLog() {
  if (logEntries.length > 500) logEntries = logEntries.slice(-500);
  localStorage.setItem('logEntries', JSON.stringify(logEntries));
}
function fmtTs(ts) {
  const d = new Date(ts);
  const pad = (n) => String(n).padStart(2, '0');
  return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
function dateKey(ts) {
  const d = new Date(ts);
  const pad = (n) => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function dateLabel(key) {
  const d = new Date(key + 'T00:00:00');
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 (${days[d.getDay()]})`;
}

function rebuildDateOptions() {
  const keys = [...new Set(logEntries.map(e => dateKey(e.ts)))].sort().reverse();
  const cur = logDate.value;
  logDate.innerHTML = '<option value="">全期間</option>' +
    keys.map(k => `<option value="${k}">${dateLabel(k)}</option>`).join('');
  if (keys.includes(cur)) logDate.value = cur;
}

function highlight(text, q) {
  if (!q) return escapeHtml(text);
  const lower = text.toLowerCase();
  const ql = q.toLowerCase();
  let out = '', i = 0;
  while (i < text.length) {
    const idx = lower.indexOf(ql, i);
    if (idx === -1) { out += escapeHtml(text.slice(i)); break; }
    out += escapeHtml(text.slice(i, idx)) + '<span class="hl">' + escapeHtml(text.slice(idx, idx+q.length)) + '</span>';
    i = idx + q.length;
  }
  return out;
}

function renderLog() {
  const q = logSearch.value.trim();
  const filterDate = logDate.value;
  let filtered = logEntries;
  if (filterDate) filtered = filtered.filter(e => dateKey(e.ts) === filterDate);
  if (q) {
    const ql = q.toLowerCase();
    filtered = filtered.filter(e => e.src.toLowerCase().includes(ql) || e.dst.toLowerCase().includes(ql));
  }
  if (filtered.length === 0) {
    logBody.innerHTML = '<div class="empty-log">' + (logEntries.length === 0 ? 'まだ記録がありません' : '該当なし') + '</div>';
    return;
  }
  // 日付別グルーピング
  const groups = {};
  for (const e of filtered) {
    const k = dateKey(e.ts);
    (groups[k] = groups[k] || []).push(e);
  }
  const sortedKeys = Object.keys(groups).sort();
  logBody.innerHTML = '';
  for (const k of sortedKeys) {
    const head = document.createElement('div');
    head.className = 'date-group';
    head.textContent = dateLabel(k) + '   (' + groups[k].length + '件)';
    logBody.appendChild(head);
    for (const e of groups[k]) {
      const div = document.createElement('div');
      div.className = 'log-entry';
      const tag = e.from === 'ja' ? 'JA→EN' : 'EN→JA';
      div.innerHTML = `<div class="ts"><span class="lang-tag">${tag}</span>${fmtTs(e.ts)}</div>
        <div class="src">${highlight(e.src, q)}</div>
        <div class="dst">${highlight(e.dst, q)}</div>`;
      logBody.appendChild(div);
    }
  }
  logBody.scrollTop = logBody.scrollHeight;
}

logSearch.addEventListener('input', renderLog);
logDate.addEventListener('change', renderLog);
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function addLog(from, src, dst) {
  logEntries.push({ ts: Date.now(), from, src, dst });
  saveLog();
  appendConfMessage(from, src, dst);
}
logBtn.addEventListener('click', () => { rebuildDateOptions(); renderLog(); logModal.classList.add('show'); });
logClose.addEventListener('click', () => logModal.classList.remove('show'));
logClear.addEventListener('click', () => {
  if (!confirm('議事録を全削除しますか？（会議モードの字幕も消えます）')) return;
  logEntries = []; saveLog(); renderLog(); confLog.innerHTML = '';
});
logCopy.addEventListener('click', async () => {
  const text = logEntries.map(e => `[${fmtTs(e.ts)}] ${e.from === 'ja' ? 'JA→EN' : 'EN→JA'}\n  ${e.src}\n  ${e.dst}`).join('\n\n');
  try {
    await navigator.clipboard.writeText(text);
    logCopy.textContent = 'コピー済';
    setTimeout(() => logCopy.textContent = 'コピー', 1500);
  } catch (e) { showError('コピー失敗: ' + e.message); }
});

// 会議モードに過去ログ初期表示
function initConfLog() {
  confLog.innerHTML = '';
  const recent = logEntries.slice(-30);
  for (const e of recent) appendConfMessage(e.from, e.src, e.dst, false);
  confLog.scrollTop = confLog.scrollHeight;
}
function appendConfMessage(from, src, dst, animate = true) {
  const div = document.createElement('div');
  div.className = 'conf-msg ' + (from === 'ja' ? 'from-ja' : 'from-en');
  if (!animate) div.style.animation = 'none';
  const tag = from === 'ja' ? 'JA → EN' : 'EN → JA';
  div.innerHTML = `<div class="tag">${tag}</div>
    <div class="src">${escapeHtml(src)}</div>
    <div class="dst">${escapeHtml(dst)}</div>`;
  confLog.appendChild(div);
  while (confLog.children.length > 60) confLog.removeChild(confLog.firstChild);
  confLog.scrollTop = confLog.scrollHeight;
}
initConfLog();

// ---- マイクインジケータ（SpeechRecognitionのイベントで連動・getUserMedia不使用） ----
function setMicState(state) {
  // state: 'idle' | 'listening' | 'speaking'
  micMeter.classList.toggle('live', state !== 'idle');
  if (state === 'speaking') {
    micMeter.style.background = '#22c55e';
    micMeter.style.height = '64px';
  } else if (state === 'listening') {
    micMeter.style.background = '#eab308';
    micMeter.style.height = '20px';
  } else {
    micMeter.style.background = '#dc2626';
    micMeter.style.height = '4px';
  }
}

// ---- 音声認識・翻訳 ----
let running = false;
let recognition = null;
let currentLang = 'ja-JP';

if (!SR) { showError('このブラウザは音声認識に未対応'); startBtn.disabled = true; }

function showError(msg) {
  let el = document.querySelector('.err');
  if (!el) { el = document.createElement('div'); el.className = 'err'; document.body.appendChild(el); }
  el.textContent = msg;
  clearTimeout(showError._t);
  showError._t = setTimeout(() => el.remove(), 4000);
}
function hasJapanese(text) {
  return /[぀-ゟ゠-ヿ一-鿿]/.test(text);
}
async function translate(text, from, to) {
  const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('g ' + res.status);
    const data = await res.json();
    return data[0].map(seg => seg[0]).join('');
  } catch (e) {
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
    if (!res.ok) throw new Error('mm ' + res.status);
    const d = await res.json();
    return d.responseData.translatedText;
  }
}
function pushHistory(elContainer, text) {
  if (elContainer.children.length >= 20) elContainer.removeChild(elContainer.firstChild);
  const d = document.createElement('div');
  d.textContent = text;
  elContainer.appendChild(d);
  elContainer.scrollTop = elContainer.scrollHeight;
}

async function handleResult(text) {
  text = text.trim();
  if (!text) return;
  const isJa = hasJapanese(text);
  if (isJa) {
    if (!dstJa.classList.contains('placeholder') && dstJa.textContent) pushHistory(histJa, dstJa.textContent);
    dstJa.classList.remove('placeholder');
    dstJa.textContent = text;
    if (!dstEn.classList.contains('placeholder') && dstEn.textContent && dstEn.textContent !== '...' && dstEn.textContent !== 'listening...') pushHistory(histEn, dstEn.textContent);
    dstEn.classList.remove('placeholder');
    dstEn.textContent = '...';
    try {
      const t = await translate(text, 'ja', 'en');
      dstEn.textContent = t;
      addLog('ja', text, t);
    } catch (e) { dstEn.textContent = '(translation failed)'; showError(e.message); }
  } else {
    if (!dstEn.classList.contains('placeholder') && dstEn.textContent) pushHistory(histEn, dstEn.textContent);
    dstEn.classList.remove('placeholder');
    dstEn.textContent = text;
    if (!dstJa.classList.contains('placeholder') && dstJa.textContent && dstJa.textContent !== '...' && dstJa.textContent !== '中央のボタンで開始') pushHistory(histJa, dstJa.textContent);
    dstJa.classList.remove('placeholder');
    dstJa.textContent = '...';
    try {
      const t = await translate(text, 'en', 'ja');
      dstJa.textContent = t;
      addLog('en', text, t);
    } catch (e) { dstJa.textContent = '(翻訳失敗)'; showError(e.message); }
  }
}

function setInterim(text, lang) {
  // 対面モード
  if (lang === 'ja-JP') {
    interimJa.textContent = text; interimJa.classList.toggle('active', !!text);
    interimEn.textContent = ''; interimEn.classList.remove('active');
  } else {
    interimEn.textContent = text; interimEn.classList.toggle('active', !!text);
    interimJa.textContent = ''; interimJa.classList.remove('active');
  }
  // 会議モード
  confInterim.textContent = text ? `[${lang === 'ja-JP' ? 'JA' : 'EN'}] ${text}` : '';
  confInterim.classList.toggle('active', !!text);
}

function startCycle() {
  if (!running) return;
  recognition = new SR();
  recognition.lang = currentLang;
  recognition.interimResults = true;
  recognition.continuous = false;
  recognition.maxAlternatives = 1;

  let finalText = '';

  recognition.onstart = () => setMicState('listening');
  recognition.onspeechstart = () => setMicState('speaking');
  recognition.onspeechend = () => setMicState('listening');
  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const r = e.results[i];
      if (r.isFinal) finalText += r[0].transcript;
      else interim += r[0].transcript;
    }
    setInterim(interim || finalText, currentLang);
  };
  recognition.onerror = (e) => {
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      running = false; showError('マイク権限が拒否されています'); stopAll();
    } else if (e.error !== 'no-speech' && e.error !== 'aborted') {
      console.warn('recog err:', e.error);
    }
  };
  recognition.onend = () => {
    setInterim('', currentLang);
    if (finalText.trim()) handleResult(finalText);
    currentLang = currentLang === 'ja-JP' ? 'en-US' : 'ja-JP';
    if (running) setTimeout(startCycle, 30);
  };

  try { recognition.start(); }
  catch (err) { showError('開始失敗: ' + err.message); setTimeout(startCycle, 500); }
}

function startAll() {
  if (running) return;
  running = true;
  currentLang = 'ja-JP';
  startBtn.classList.add('running');
  startBtn.textContent = 'STOP';
  confHead.classList.add('live');
  dstEn.classList.add('placeholder');
  dstJa.classList.add('placeholder');
  dstEn.textContent = 'listening...';
  dstJa.textContent = '聞き取り中...';
  startCycle();
}
function stopAll() {
  running = false;
  if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
  setInterim('', 'ja-JP'); setInterim('', 'en-US');
  startBtn.classList.remove('running');
  startBtn.textContent = 'START';
  confHead.classList.remove('live');
  setMicState('idle');
}

startBtn.addEventListener('click', () => { if (running) stopAll(); else startAll(); });

document.addEventListener('visibilitychange', () => {
  if (document.hidden && running) stopAll();
});
</script>
</body>
</html>
